version: '3.8'

services:
  # MCP Server - 博客发布服务
  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    container_name: blog-mcp-server
    ports:
      - "8090:8090"  # 主机端口8090 → 容器端口8090
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8090
      - LOG_LEVEL=INFO
      - DATA_DIR=/app/data
      - UPLOADS_DIR=/app/uploads
      - PUBLISHED_DIR=/app/published
      # 数据库（SQLite）
      - DATABASE_URL=sqlite:///data/blog.db
      # 翻译配置（MVP使用Mock）
      - TRANSLATION_MODE=mock
      - MOCK_TRANSLATION_SUFFIX= [MOCK TRANSLATION]
      # 平台配置（MVP使用Mock）
      - PLATFORM_MODE=mock
    volumes:
      - mcp-data:/app/data
      - mcp-uploads:/app/uploads
      - mcp-published:/app/published
    networks:
      - blog-network
    mem_limit: 512m
    cpu_count: 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MinIO 对象存储（可选，为未来准备）
  # MVP 阶段不启动，需要时取消注释
  # minio:
  #   image: minio/minio:latest
  #   container_name: blog-minio
  #   ports:
  #     - "9000:9000"   # API
  #     - "9001:9001"   # Console
  #   environment:
  #     MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
  #     MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
  #   volumes:
  #     - minio-data:/data
  #   command: minio server /data --console-address ":9001"
  #   networks:
  #     - blog-network
  #   mem_limit: 512m
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

volumes:
  mcp-data:
    driver: local
  mcp-uploads:
    driver: local
  mcp-published:
    driver: local
  # minio-data:
  #   driver: local

networks:
  blog-network:
    driver: bridge
