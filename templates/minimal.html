<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            max-width: 680px;
            margin: 0 auto;
            padding: 60px 30px;
            line-height: 1.8;
            color: #222;
            background: #fff;
        }
        h1 {
            font-size: 2em;
            font-weight: normal;
            margin-bottom: 40px;
            letter-spacing: -0.02em;
        }
        img {
            max-width: 100%;
            height: auto;
            margin: 40px 0;
            filter: grayscale(100%);
            border-radius: 4px;
        }
        p {
            margin-bottom: 1.8em;
            text-align: justify;
            text-justify: inter-word;
            font-size: 1.1em;
        }
        a {
            color: #000;
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 3px;
        }
        a:hover {
            text-decoration-thickness: 2px;
        }
        .meta {
            color: #999;
            font-size: 0.85em;
            margin-bottom: 50px;
            font-style: italic;
        }
        blockquote {
            border-left: none;
            padding-left: 0;
            font-style: italic;
            color: #555;
            margin: 40px 0;
            font-size: 1.2em;
        }
        hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 60px 0;
        }
    </style>
</head>
<body>
    <article>
        <h1>{{ title }}</h1>
        <div class="meta">
            发布时间：{{ generated_at }}
        </div>
        {% if images %}
        <img src="{{ images[0] }}" alt="Cover">
        {% endif %}
        <div class="content">
            {{ content | safe }}
        </div>
    </article>
</body>
</html>
