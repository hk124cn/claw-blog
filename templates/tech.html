<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
            line-height: 1.7;
            background: #f9f9f9;
            color: #333;
        }
        article {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 25px 0;
        }
        pre {
            background: #f6f8fa;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 14px;
            border: 1px solid #e1e4e8;
            line-height: 1.45;
        }
        pre code {
            background: none;
            padding: 0;
            font-size: inherit;
        }
        code {
            font-family: 'Monaco', 'Menlo', 'Consolas', 'Courier New', monospace;
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        blockquote {
            border-left: 4px solid #dfe2e5;
            padding: 0 1em;
            color: #6a737d;
            margin: 0 0 20px 0;
            font-style: italic;
            background: #f6f8fa;
            padding: 15px 20px;
            border-radius: 0 8px 8px 0;
        }
        a {
            color: #0366d6;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .meta {
            color: #586069;
            font-size: 0.9em;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e1e4e8;
        }
        .content {
            margin-top: 20px;
        }
        h1, h2, h3, h4, h5, h6 {
            color: #24292e;
            margin-top: 1.8em;
            margin-bottom: 0.8em;
            font-weight: 600;
        }
        h1 {
            border-bottom: 2px solid #e1e4e8;
            padding-bottom: 15px;
            font-size: 2.25em;
        }
        h2 {
            border-bottom: 1px solid #e1e4e8;
            padding-bottom: 8px;
            font-size: 1.75em;
        }
        ul, ol {
            padding-left: 30px;
            margin: 15px 0;
        }
        li {
            margin-bottom: 0.5em;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 25px 0;
        }
        th, td {
            border: 1px solid #dfe2e5;
            padding: 12px 15px;
            text-align: left;
        }
        th {
            background: #f6f8fa;
            font-weight: 600;
        }
        tr:nth-child(even) {
            background: #f6f8fa;
        }
        hr {
            border: none;
            border-top: 1px solid #e1e4e8;
            margin: 50px 0;
        }
        .language-* {
            display: block;
            overflow-x: auto;
            padding: 16px;
        }
    </style>
</head>
<body>
    <article>
        <header>
            <h1>{{ title }}</h1>
            <div class="meta">
                发布时间：{{ generated_at }} | 模板：tech
            </div>
        </header>
        {% if images %}
        <figure>
            <img src="{{ images[0] }}" alt="文章封面">
            {% if images|length > 1 %}
            <figcaption style="font-size:0.9em;color:#666;text-align:center;margin-top:10px;">
                共 {{ images|length }} 张图片
            </figcaption>
            {% endif %}
        </figure>
        {% endif %}
        <div class="content">
            {{ content | safe }}
        </div>
    </article>
</body>
</html>
